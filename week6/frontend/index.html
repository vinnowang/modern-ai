<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modern Software Dev Starter</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <h1>Modern Software Dev Starter</h1>

      <section>
        <h2>Notes</h2>
        <form id="note-form">
          <input id="note-title" placeholder="Title" required />
          <input id="note-content" placeholder="Content" required />
          <button type="submit">Add</button>
        </form>
        <ul id="notes"></ul>
      </section>

      <section>
        <h2>Action Items</h2>
        <form id="action-form">
          <input id="action-desc" placeholder="Description" required />
          <button type="submit">Add</button>
        </form>
        
        <!-- Task 4 Controls -->
        <div style="margin: 12px 0; display: flex; gap: 10px; align-items: center;">
          <label>Filter:</label>
          <select id="action-filter" onchange="loadActions()">
            <option value="all">All</option>
            <option value="open">Open</option>
            <option value="completed">Completed</option>
          </select>
          <button id="bulk-complete-btn" onclick="bulkCompleteActions()">Bulk Complete Selected</button>
        </div>

        <ul id="actions"></ul>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
